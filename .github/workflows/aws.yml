# This workflow deploys the student records web application to Amazon EC2 instances
# in an Auto Scaling Group behind an Application Load Balancer.
# It is triggered when code is pushed to the "main" branch.

name: Deploy to EC2 Auto Scaling

on:
  push:
    branches: ["main"]

env:
  AWS_REGION: MY_AWS_REGION
  ASG_NAME: MY_AUTO_SCALING_GROUP        # Name of your EC2 Auto Scaling Group
  DEPLOYMENT_BUCKET: MY_S3_BUCKET       # S3 bucket for deployment artifacts

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Package application
      run: |
        zip -r app.zip .

    - name: Upload artifact to S3
      run: |
        aws s3 cp app.zip s3://$DEPLOYMENT_BUCKET/app.zip

    - name: Trigger EC2 Auto Scaling rolling update
      run: |
        aws autoscaling start-instance-refresh \
          --auto-scaling-group-name $ASG_NAME \
          --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 120}'
